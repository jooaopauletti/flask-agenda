<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Agenda de Contatos</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">Agenda de Contatos</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="/adicionar" method="POST" class="row g-2 mb-4">
        <div class="col">
            <input type="text" name="nome" placeholder="Nome" class="form-control">
        </div>
        <div class="col">
            <input type="text" name="telefone" placeholder="Telefone" class="form-control">
        </div>
        <div class="col">
            <input type="text" name="email" placeholder="Email" class="form-control">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
        {% for contato in contatos %}
            <tr>
                <td>{{ contato[1] }}</td>
                <td>{{ contato[2] }}</td>
                <td>{{ contato[3] }}</td>
                <td>
                    <a href="/editar/{{ contato[0] }}" class="btn btn-sm btn-warning">Editar</a>
                    <form action="/deletar/{{ contato[0] }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Deletar</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
