<!DOCTYPE html>
<html>
<head>
    <title>Editar Contato</title>
</head>
<body>
    <form action="/atualizar/{{ contato[0] }}" method="POST">
    <input type="text" name="nome" value="{{ contato[1] }}">
    <input type="text" name="telefone" value="{{ contato[2] }}">
    <input type="text" name="email" value="{{ contato[3] }}">
    <button type="submit">Salvar</button>
</form>
</body>
</html>
