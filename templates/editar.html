<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Editar Contato</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">Editar Contato</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}
    <form action="/atualizar/{{ contato[0] }}" method="POST">
        <div class="mb-3">
            <input type="text" name="nome" value="{{ contato[1] }}" class="form-control" placeholder="Nome">
        </div>
        <div class="mb-3">
            <input type="text" name="telefone" value="{{ contato[2] }}" class="form-control" placeholder="Telefone">
        </div>
        <div class="mb-3">
            <input type="text" name="email" value="{{ contato[3] }}" class="form-control" placeholder="Email">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
